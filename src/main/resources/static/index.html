<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - Student Management System</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8b5cf6;
            --primary-gradient: linear-gradient(135deg, #8b5cf6 0%, #3b82f6 100%);
            --background: #0f172a;
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
            --glass-bg: rgba(30, 41, 59, 0.45);
            --glass-border: rgba(255, 255, 255, 0.08);
            --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--background);
            background-image: 
                radial-gradient(at 0% 0%, rgba(139, 92, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(59, 130, 246, 0.15) 0px, transparent 50%);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .splash-container {
            text-align: center;
            padding: 3rem;
            border-radius: 24px;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow);
            max-width: 500px;
            width: 90%;
            transform: scale(0.9);
            opacity: 0;
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .logo-box {
            font-size: 3.5rem;
            margin-bottom: 1.5rem;
            animation: float 3s ease-in-out infinite;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            letter-spacing: -0.5px;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            color: var(--text-sub);
            margin-bottom: 2rem;
        }

        .loader-track {
            height: 6px;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            overflow: hidden;
            position: relative;
            margin-bottom: 1rem;
        }

        .loader-fill {
            height: 100%;
            width: 0%;
            background: var(--primary-gradient);
            border-radius: 10px;
            animation: fillLoader 4.8s linear forwards;
        }

        .countdown-text {
            font-size: 0.85rem;
            font-family: 'Inter', sans-serif;
            color: var(--text-sub);
        }

        @keyframes fadeInUp {
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px) rotate(0deg);
            }
            50% {
                transform: translateY(-10px) rotate(5deg);
            }
        }

        @keyframes fillLoader {
            to {
                width: 100%;
            }
        }

        /* Fade-out animation for redirect */
        .fade-out {
            animation: fadeOut 0.5s ease-in-out forwards;
        }

        @keyframes fadeOut {
            to {
                opacity: 0;
                transform: scale(0.95);
            }
        }
    </style>
</head>
<body>

    <div class="splash-container" id="splash">
        <div class="logo-box">🎓</div>
        <h1>Vedic Academy</h1>
        <p>Student Management Workspace</p>
        
        <div class="loader-track">
            <div class="loader-fill"></div>
        </div>
        <div class="countdown-text" id="countdown">Loading secure portal in 5 seconds...</div>
    </div>

    <script>
        // Smooth countdown
        let seconds = 5;
        const countdownText = document.getElementById('countdown');
        const splashContainer = document.getElementById('splash');

        const interval = setInterval(() => {
            seconds--;
            if (seconds > 0) {
                countdownText.textContent = `Loading secure portal in ${seconds} seconds...`;
            } else {
                countdownText.textContent = "Redirecting...";
                clearInterval(interval);
            }
        }, 1000);

        // Auto-redirect to login page after exactly 5 seconds
        setTimeout(() => {
            splashContainer.classList.add('fade-out');
            setTimeout(() => {
                window.location.href = 'login.html';
            }, 500); // Wait for fade-out animation to complete
        }, 5000);
    </script>
</body>
</html>
