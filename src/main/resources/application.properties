# Server Port
server.port=${PORT:8080}

# Application Name
spring.application.name=student-management-system

# ==========================================
# DATABASE CONFIGURATION
# ==========================================

# 1. Unified Database Configuration (Defaults to Neon PostgreSQL, overridable via Env Variables)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://ep-calm-rain-apuh6yw4.c-7.us-east-1.aws.neon.tech:5432/neondb?sslmode=require}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:neondb_owner}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driverClassName=${SPRING_DATASOURCE_DRIVER:org.postgresql.Driver}

# [Optional] H2 Database Option (Commented out, uncomment to work offline)
# spring.datasource.url=jdbc:h2:mem:school_db;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
# spring.datasource.driverClassName=org.h2.Driver
# spring.datasource.username=sa
# spring.datasource.password=
# spring.h2.console.enabled=true
# spring.h2.console.path=/h2-console

# ==========================================
# JPA / HIBERNATE SETTINGS
# ==========================================
spring.jpa.database-platform=${SPRING_JPA_PLATFORM:org.hibernate.dialect.PostgreSQLDialect}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# File Upload / Restricting JSON sizes
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# ==========================================
# REAL TWILIO SMS GATEWAY SETTINGS
# ==========================================
# Set these to your Twilio credentials to dispatch real SMS text messages to mobile phones.
# If left blank, the application gracefully defaults to the console and in-app SMS log history table!
twilio.account.sid=
twilio.auth.token=
twilio.phone.number=
