# Server Port
server.port=${PORT:8080}

# Application Name
spring.application.name=student-management-system

# ==========================================
# DATABASE CONFIGURATION
# ==========================================

# 1. OPTION A: In-Memory H2 Database (Disabled)
# spring.datasource.url=jdbc:h2:mem:school_db;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
# spring.datasource.driverClassName=org.h2.Driver
# spring.datasource.username=sa
# spring.datasource.password=
# spring.h2.console.enabled=true
# spring.h2.console.path=/h2-console

# 2. OPTION B: PostgreSQL Database (Active)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/school_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:2324}
spring.datasource.driverClassName=org.postgresql.Driver

# ==========================================
# JPA / HIBERNATE SETTINGS
# ==========================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# File Upload / Restricting JSON sizes
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# ==========================================
# REAL TWILIO SMS GATEWAY SETTINGS
# ==========================================
# Set these to your Twilio credentials to dispatch real SMS text messages to mobile phones.
# If left blank, the application gracefully defaults to the console and in-app SMS log history table!
twilio.account.sid=
twilio.auth.token=
twilio.phone.number=
